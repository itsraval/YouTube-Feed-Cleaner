<!DOCTYPE html>
<html>
<head>
    <title>Cleaner Settings</title>
    <style>
        body { font-family: sans-serif; padding: 20px; width: 500px; font-size: 20px}
        div { margin-bottom: 10px; }
        button {font-family: sans-serif; font-size: 20px; margin-top: 10px}
        h2 {margin-bottom: 5px}
        p {font-size: 16px; font-style: italic; margin-top: 5px}
        #settingsSaved{margin-top: 10px; font-size: 23px; color: red; opacity: 0;}
    </style>
</head>
<body>
    <h2>Hide Sections:</h2>
    <p>&nbsp;&nbsp;Tick to hide</p>
    <div>
        <input type="checkbox" id="shorts"> <label for="shorts">Shorts</label>
    </div>
    <div>
        <input type="checkbox" id="relevant"> <label for="relevant">Most Relevant</label>
    </div>
    <div>
        <input type="checkbox" id="breakingNews"> <label for="breakingNews">Breaking News</label>
    </div>
    <div>
        <input type="checkbox" id="trending"> <label for="trending">Trending</label>
    </div>
    <div>
        <input type="checkbox" id="topNews"> <label for="topNews">Top News</label>
    </div>
    <div>
        <input type="checkbox" id="exploreMoreTopics"> <label for="exploreMoreTopics">Explore More Topics</label>
    </div>
    <button id="save">Save Settings</button>

    <div id="settingsSaved">Settings saved!<br>Refresh YouTube to see changes.</div>

    <script src="options.js"></script>
</body>
</html>
